plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'com.gratu.blocker'
version = '0.1.0'

expoModule {
  canBePublished false
}

android {
  namespace "com.gratu.blocker"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}
